{% extends 'base.html' %}
{% block content %}

<h2 style="margin-bottom:20px;">Edit Buku</h2>

<form method="POST">
{% csrf_token %}

<div class="form-grid">

    <div class="form-group">
        <label>Judul Buku</label>
        <input type="text" name="judul" value="{{ buku.1 }}">
    </div>

    <div class="form-group">
        <label>Pengarang</label>
        <input type="text" name="pengarang" value="{{ buku.2 }}">
    </div>

    <div class="form-group">
        <label>Kategori</label>
        <input type="text" name="kategori" value="{{ buku.3 }}">
    </div>

    <div class="form-group">
        <label>Penerbit</label>
        <input type="text" name="penerbit" value="{{ buku.4 }}">
    </div>

    <div class="form-group">
        <label>Tahun Terbit</label>
        <input type="text" name="tahun" value="{{ buku.5 }}">
    </div>

    <div class="form-group">
        <label>Stok</label>
        <input type="number" name="stok" value="{{ buku.7 }}">
    </div>

    <div class="form-group">
        <label>Rak / Lokasi</label>
        <input type="text" name="rak" value="{{ buku.6 }}">
    </div>

</div>

<div class="form-group full">
    <label>Deskripsi</label>
    <textarea name="deskripsi">{{ buku.8 }}</textarea>
</div>

<div class="form-actions">
    <a href="/buku/" class="btn-cancel">Batal</a>
    <button type="submit" class="btn-save">Perbarui Buku</button>
</div>

</form>

{% endblock %}
